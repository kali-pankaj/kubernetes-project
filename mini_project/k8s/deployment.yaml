apiVersion: apps/v1
kind: Deployment
metadata: 
  name: my-app

spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app
  
  template:
    metadata:
      labels:
        app: my-app

    spec: 
      containers:
      - name: "my-container"
        image: kalitesthub/my-web-app:v1.12

        ports:
          - containerPort: 3000
