# NAMESPACE
---
apiVersion: v1
kind: Namespace
metadata:
  name: production-prod

# RESOURCE QUOTA
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: production-prod
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 2Gi
    limits.cpu: "4"
    limits.memory: 4Gi
    pods: "10"

# CONFIGMAP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: production-prod
data:
  ENV: "production"
  LOG_LEVEL: "info"

# SECRET
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: production-prod
type: Opaque
data:
  DB_USER: PANKAJZYX=
  DB_PASS: PANKAJXYZ=

# SERVICE ACCOUNT
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-sa
  namespace: production-prod

# ROLE
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-role
  namespace: production-prod
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

# ROLE BINDING
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-rolebinding
  namespace: production-prod
subjects:
  - kind: ServiceAccount
    name: app-sa
    namespace: production-prod
roleRef:
  kind: Role
  name: app-role
  apiGroup: rbac.authorization.k8s.io

# NETWORK POLICY
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: app-netpol
  namespace: production-prod
spec:
  podSelector:
    matchLabels:
      app: application-app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              access: allowed

# PVC
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-pvc
  namespace: production-prod
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

# DEPLOYMENT
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: application-app
  namespace: production-prod
spec:
  replicas: 3

  selector:
    matchLabels:
      app: application-app

  template:
    metadata:
      labels:
        app: application-app

    spec:
      serviceAccountName: app-sa

      initContainers:
        - name: init-check
          image: busybox
          command: ["sh", "-c", "echo init complete"]

      containers:
        - name: main-app
          image: nginx:1.25

          ports:
            - containerPort: 80

          env:
            - name: ENV
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ENV

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_USER

          volumeMounts:
            - name: storage
              mountPath: /data

          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

        - name: log-sidecar
          image: busybox
          command: ["sh", "-c", "while true; do echo logging; sleep 5; done"]

      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: app-pvc

# SERVICE
---
apiVersion: v1
kind: Service
metadata:
  name: production-service
  namespace: production-prod
spec:
  selector:
    app: application-app
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP

# INGRESS
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: production-ingress
  namespace: production-prod
spec:
  rules:
    - host: production.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: production-service
                port:
                  number: 80

# HPA
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: production-hpa
  namespace: production-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: application-app

  minReplicas: 3
  maxReplicas: 10

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

# POD DISRUPTION BUDGET
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: production-pdb
  namespace: production-prod
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: application-app